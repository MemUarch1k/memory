<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memuar's Memory</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 12px;
        }

        .game-container {
            background: #0f1117;
            border-radius: 40px;
            padding: 16px;
            max-width: 100%;
            width: 100%;
        }

        .game-panel {
            background: #07090e;
            border-radius: 28px;
            padding: 16px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #0f1117;
            border-radius: 20px;
            padding: 8px 12px;
            text-align: center;
            flex: 1;
            min-width: 70px;
        }

        .stat-label {
            color: #5a6e8a;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .stat-value {
            color: #2ecc71;
            font-size: 22px;
            font-weight: bold;
            line-height: 1;
        }

        .best .stat-value {
            color: #f39c12;
            font-size: 18px;
        }

        .difficulty-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .diff-btn {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
        }

        .diff-btn.active {
            background: #2ecc71;
            color: #0a0c12;
        }

        .board {
            display: grid;
            justify-content: center;
            gap: 6px;
            margin-bottom: 16px;
        }

        .card {
            background: linear-gradient(145deg, #1a1f2a, #0f1117);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 70px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .card.flipped, .card.matched {
            background: linear-gradient(145deg, #2a2f3e, #1a1f2a);
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.3);
        }

        .card.matched {
            opacity: 0.6;
            filter: grayscale(0.3);
            cursor: default;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }

        .status {
            text-align: center;
            margin-top: 12px;
            color: #e67e22;
            font-weight: bold;
            font-size: 14px;
            background: #0f1117;
            padding: 6px;
            border-radius: 40px;
        }

        /* Адаптация под экран — карточки сами уменьшаются */
        @media (max-width: 600px) {
            .card { font-size: 18px; max-width: 55px; }
            .stat-value { font-size: 18px; }
            .stat-card { padding: 6px 8px; }
        }

        @media (max-width: 480px) {
            .card { font-size: 16px; max-width: 45px; }
            .game-container { padding: 10px; }
            .game-panel { padding: 12px; }
        }

        @media (max-width: 400px) {
            .card { font-size: 14px; max-width: 38px; }
            .diff-btn { font-size: 10px; padding: 4px 10px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-panel">
        <div class="stats">
            <div class="stat-card"><div class="stat-label">ХОДЫ</div><div class="stat-value" id="moves">0</div></div>
            <div class="stat-card"><div class="stat-label">ВРЕМЯ</div><div class="stat-value" id="timer">00:00</div></div>
            <div class="stat-card best"><div class="stat-label">РЕКОРД ХОДЫ</div><div class="stat-value" id="bestMoves">—</div></div>
            <div class="stat-card best"><div class="stat-label">РЕКОРД ВРЕМЯ</div><div class="stat-value" id="bestTime">—</div></div>
        </div>

        <div class="difficulty-selector">
            <button class="diff-btn" data-pairs="10">🔟 10 ПАР</button>
            <button class="diff-btn" data-pairs="15">1️⃣5️⃣ 15 ПАР</button>
            <button class="diff-btn" data-pairs="25">2️⃣5️⃣ 25 ПАР</button>
        </div>

        <div class="board" id="board"></div>

        <div class="controls">
            <button id="newGameBtn">🔄 НОВАЯ ИГРА</button>
        </div>
        <div class="status" id="gameStatus">🧠 НАЙДИ ПАРЫ</div>
    </div>
</div>

<script>
(function(){
    let currentPairs = 25;
    let cards = [], flippedCards = [], matchedPairs = 0, moves = 0, gameActive = true, lockBoard = false;
    let timerSeconds = 0, timerInterval = null;
    
    const emojiSet = ["🐱","🐶","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐸","🐒","🐔","🐧","🐦","🐌","🐝","🐞","🐠","🐟","🐙","🐳","🐬","🦋","🐞","🐲"];
    const geometrySet = ["🔴","🔵","🟢","🟡","🟣","🟠","🔷","🔺","⚪","⬛","❤️","💙","💚","💛","🧡","🔶","🔸","🔹","◻️","◼️","🔲","🔳","🟥","🟧","🟨"];
    
    let bestMoves = { 10: null, 15: null, 25: null };
    let bestTimes = { 10: null, 15: null, 25: null };
    
    const boardEl = document.getElementById('board');
    const movesSpan = document.getElementById('moves');
    const timerSpan = document.getElementById('timer');
    const bestMovesSpan = document.getElementById('bestMoves');
    const bestTimeSpan = document.getElementById('bestTime');
    const gameStatusSpan = document.getElementById('gameStatus');
    
    function loadRecords() {
        try {
            const savedMoves = localStorage.getItem('memory_best_moves');
            const savedTimes = localStorage.getItem('memory_best_times');
            if (savedMoves) bestMoves = JSON.parse(savedMoves);
            if (savedTimes) bestTimes = JSON.parse(savedTimes);
        } catch(e) {}
        updateRecordsDisplay();
    }
    
    function saveRecords() {
        localStorage.setItem('memory_best_moves', JSON.stringify(bestMoves));
        localStorage.setItem('memory_best_times', JSON.stringify(bestTimes));
    }
    
    function updateRecordsDisplay() {
        bestMovesSpan.innerText = bestMoves[currentPairs] !== null ? bestMoves[currentPairs] : "—";
        bestTimeSpan.innerText = bestTimes[currentPairs] !== null ? formatTime(bestTimes[currentPairs]) : "—";
    }
    
    function formatTime(sec) {
        return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
    }
    
    function generateRandomContent() {
        const useEmoji = Math.random() < 0.5;
        const sourceSet = useEmoji ? emojiSet : geometrySet;
        const shuffled = [...sourceSet];
        for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }
        const selected = shuffled.slice(0, currentPairs);
        return selected.map(v=>({value:v, type:useEmoji?'emoji':'geo'}));
    }
    
    function shuffleArray(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    
    function initGame(){
        if(timerInterval) clearInterval(timerInterval);
        timerSeconds=0; timerSpan.innerText="00:00"; moves=0; matchedPairs=0; gameActive=true; lockBoard=false; flippedCards=[];
        movesSpan.innerText="0"; gameStatusSpan.innerHTML="🧠 НАЙДИ ПАРЫ"; gameStatusSpan.style.color="#e67e22";
        
        const pairs = generateRandomContent();
        let deck=[];
        for(let i=0;i<currentPairs;i++){ deck.push({id:i, value:pairs[i].value, matched:false, flipped:false}); deck.push({id:i, value:pairs[i].value, matched:false, flipped:false}); }
        deck=shuffleArray(deck); cards=deck;
        renderBoard();
        
        timerInterval=setInterval(()=>{ if(gameActive && matchedPairs<currentPairs){ timerSeconds++; timerSpan.innerText=formatTime(timerSeconds); } },1000);
    }
    
    function renderBoard(){
        let cols, rows;
        if (currentPairs === 10) { cols = 5; rows = 4; }
        else if (currentPairs === 15) { cols = 6; rows = 5; }
        else { cols = 10; rows = 5; }
        
        boardEl.style.display = 'grid';
        boardEl.style.gridTemplateColumns = `repeat(${cols}, minmax(35px, 70px))`;
        boardEl.style.gap = '6px';
        boardEl.style.justifyContent = 'center';
        boardEl.innerHTML = '';
        
        for(let i = 0; i < cards.length; i++){
            const card = cards[i];
            const div = document.createElement('div');
            div.className = 'card';
            if(card.matched) div.classList.add('matched');
            if(card.flipped && !card.matched) div.classList.add('flipped');
            div.innerText = (card.flipped || card.matched) ? card.value : "?";
            div.addEventListener('click', (function(idx) {
                return function() { onCardClick(idx); };
            })(i));
            boardEl.appendChild(div);
        }
    }
    
    function onCardClick(idx){
        if(!gameActive || lockBoard || cards[idx].matched || cards[idx].flipped) return;
        
        cards[idx].flipped = true;
        flippedCards.push(idx);
        renderBoard();
        
        if(flippedCards.length === 2){
            lockBoard = true;
            moves++;
            movesSpan.innerText = moves;
            
            const idx1 = flippedCards[0];
            const idx2 = flippedCards[1];
            const match = (cards[idx1].id === cards[idx2].id);
            
            if(match){
                cards[idx1].matched = true;
                cards[idx2].matched = true;
                cards[idx1].flipped = false;
                cards[idx2].flipped = false;
                matchedPairs++;
                flippedCards = [];
                lockBoard = false;
                renderBoard();
                
                if(matchedPairs === currentPairs){
                    gameActive = false;
                    if(timerInterval) clearInterval(timerInterval);
                    gameStatusSpan.innerHTML = "🏆 ПОБЕДА! 🏆";
                    gameStatusSpan.style.color = "#f1c40f";
                    
                    if(bestMoves[currentPairs] === null || moves < bestMoves[currentPairs]) {
                        bestMoves[currentPairs] = moves;
                    }
                    if(bestTimes[currentPairs] === null || timerSeconds < bestTimes[currentPairs]) {
                        bestTimes[currentPairs] = timerSeconds;
                    }
                    saveRecords();
                    updateRecordsDisplay();
                }
            } else {
                setTimeout(() => {
                    cards[idx1].flipped = false;
                    cards[idx2].flipped = false;
                    flippedCards = [];
                    lockBoard = false;
                    renderBoard();
                }, 700);
            }
            renderBoard();
        }
    }
    
    function setDifficulty(pairs){
        currentPairs = pairs;
        document.querySelectorAll('.diff-btn').forEach(btn => {
            if(parseInt(btn.dataset.pairs) === pairs) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        newGame();
    }
    
    function newGame(){ 
        if(timerInterval) clearInterval(timerInterval); 
        initGame(); 
    }
    
    function setupEvents() {
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', () => setDifficulty(parseInt(btn.dataset.pairs)));
        });
        document.getElementById('newGameBtn').addEventListener('click', () => newGame());
    }
    
    function start() {
        loadRecords();
        setupEvents();
        initGame();
    }
    
    start();
})();
</script>
</body>
</html>
