<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Memuar's Memory</title>
    <style>
        body {
            background: #0a0c12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            margin: 0;
            padding: 16px;
        }
        .game-container {
            background: #0f1117;
            border-radius: 48px;
            padding: 20px;
        }
        .game-panel {
            background: #07090e;
            border-radius: 32px;
            padding: 20px;
        }
        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #0f1117;
            border-radius: 24px;
            padding: 10px 20px;
            text-align: center;
        }
        .stat-label {
            color: #5a6e8a;
            font-size: 12px;
        }
        .stat-value {
            color: #2ecc71;
            font-size: 28px;
            font-weight: bold;
        }
        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .diff-btn {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 14px;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
        }
        .diff-btn.active {
            background: #2ecc71;
            color: #0a0c12;
        }
        .board {
            display: grid;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .card {
            background: #1a1f2a;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            min-width: 60px;
        }
        .card.flipped, .card.matched {
            background: #2a2f3e;
        }
        .card.matched {
            opacity: 0.6;
        }
        button {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 18px;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
        }
        .status {
            text-align: center;
            margin-top: 16px;
            color: #e67e22;
        }
        @media (max-width: 600px) {
            .card { font-size: 24px; min-width: 50px; }
            .stat-value { font-size: 20px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="game-panel">
            <div class="stats">
                <div class="stat-card"><div class="stat-label">ХОДЫ</div><div class="stat-value" id="moves">0</div></div>
                <div class="stat-card"><div class="stat-label">ВРЕМЯ</div><div class="stat-value" id="timer">00:00</div></div>
                <div class="stat-card"><div class="stat-label">РЕКОРД ХОДЫ</div><div class="stat-value" id="bestMoves">—</div></div>
                <div class="stat-card"><div class="stat-label">РЕКОРД ВРЕМЯ</div><div class="stat-value" id="bestTime">—</div></div>
            </div>
            <div class="difficulty-selector">
                <button class="diff-btn" data-pairs="10">🔟 10 ПАР</button>
                <button class="diff-btn" data-pairs="15">1️⃣5️⃣ 15 ПАР</button>
                <button class="diff-btn" data-pairs="25">2️⃣5️⃣ 25 ПАР</button>
            </div>
            <div class="board" id="board"></div>
            <div class="controls"><button id="newGameBtn">🔄 НОВАЯ ИГРА</button></div>
            <div class="status" id="gameStatus">🧠 НАЙДИ ПАРЫ</div>
        </div>
    </div>
</div>
<script>
(function(){
    let currentPairs = 25;
    let cards = [], flippedCards = [], matchedPairs = 0, moves = 0, gameActive = true, lockBoard = false;
    let timerSeconds = 0, timerInterval = null;
    const emojiSet = ["🐱","🐶","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐸","🐒","🐔","🐧","🐦","🐌","🐝","🐞","🐠","🐟","🐙"];
    const geometrySet = ["🔴","🔵","🟢","🟡","🟣","🟠","🔷","🔺","⚪","⬛","❤️","💙","💚","💛","🧡"];
    let bestMoves = {10:null,15:null,25:null}, bestTimes = {10:null,15:null,25:null};
    const boardEl = document.getElementById('board'), movesSpan = document.getElementById('moves'), timerSpan = document.getElementById('timer');
    const bestMovesSpan = document.getElementById('bestMoves'), bestTimeSpan = document.getElementById('bestTime'), gameStatusSpan = document.getElementById('gameStatus');
    
    function loadRecords() {
        try {
            const savedMoves = localStorage.getItem('memory_best_moves');
            const savedTimes = localStorage.getItem('memory_best_times');
            if(savedMoves) bestMoves = JSON.parse(savedMoves);
            if(savedTimes) bestTimes = JSON.parse(savedTimes);
        } catch(e) {}
        updateRecordsDisplay();
    }
    function saveRecords() {
        localStorage.setItem('memory_best_moves', JSON.stringify(bestMoves));
        localStorage.setItem('memory_best_times', JSON.stringify(bestTimes));
    }
    function updateRecordsDisplay() {
        bestMovesSpan.innerText = bestMoves[currentPairs] !== null ? bestMoves[currentPairs] : "—";
        bestTimeSpan.innerText = bestTimes[currentPairs] !== null ? formatTime(bestTimes[currentPairs]) : "—";
    }
    function formatTime(sec) { return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`; }
    function generateRandomContent() {
        const useEmoji = Math.random() < 0.5;
        const sourceSet = useEmoji ? emojiSet : geometrySet;
        const shuffled = [...sourceSet];
        for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }
        const selected = shuffled.slice(0, currentPairs);
        return selected.map(v=>({value:v, type:useEmoji?'emoji':'geo'}));
    }
    function shuffleArray(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    function initGame(){
        if(timerInterval) clearInterval(timerInterval);
        timerSeconds=0; timerSpan.innerText="00:00"; moves=0; matchedPairs=0; gameActive=true; lockBoard=false; flippedCards=[];
        movesSpan.innerText="0"; gameStatusSpan.innerHTML="🧠 НАЙДИ ПАРЫ"; gameStatusSpan.style.color="#e67e22";
        const pairs = generateRandomContent();
        let deck=[];
        for(let i=0;i<currentPairs;i++){ deck.push({id:i, value:pairs[i].value, matched:false, flipped:false}); deck.push({id:i, value:pairs[i].value, matched:false, flipped:false}); }
        deck=shuffleArray(deck); cards=deck;
        renderBoard();
        timerInterval=setInterval(()=>{ if(gameActive && matchedPairs<currentPairs){ timerSeconds++; timerSpan.innerText=formatTime(timerSeconds); } },1000);
    }
    function renderBoard(){
        let cols = currentPairs===10?5:(currentPairs===15?6:10);
        boardEl.style.display='grid'; boardEl.style.gridTemplateColumns=`repeat(${cols}, minmax(60px, 85px))`; boardEl.style.gap='8px';
        boardEl.innerHTML='';
        for(let i=0;i<cards.length;i++){
            const card=cards[i]; const div=document.createElement('div');
            div.className='card'; if(card.matched) div.classList.add('matched'); if(card.flipped && !card.matched) div.classList.add('flipped');
            div.innerText=(card.flipped||card.matched)?card.value:"?";
            div.addEventListener('click',(()=>onCardClick(i)));
            boardEl.appendChild(div);
        }
    }
    function onCardClick(idx){
        if(!gameActive||lockBoard||cards[idx].matched||cards[idx].flipped) return;
        cards[idx].flipped=true; flippedCards.push(idx); renderBoard();
        if(flippedCards.length===2){
            lockBoard=true; moves++; movesSpan.innerText=moves;
            const idx1=flippedCards[0], idx2=flippedCards[1], match=(cards[idx1].id===cards[idx2].id);
            if(match){
                cards[idx1].matched=true; cards[idx2].matched=true; cards[idx1].flipped=false; cards[idx2].flipped=false;
                matchedPairs++; flippedCards=[]; lockBoard=false; renderBoard();
                if(matchedPairs===currentPairs){
                    gameActive=false; if(timerInterval) clearInterval(timerInterval);
                    gameStatusSpan.innerHTML="🏆 ПОБЕДА! 🏆"; gameStatusSpan.style.color="#f1c40f";
                    if(bestMoves[currentPairs]===null || moves<bestMoves[currentPairs]) bestMoves[currentPairs]=moves;
                    if(bestTimes[currentPairs]===null || timerSeconds<bestTimes[currentPairs]) bestTimes[currentPairs]=timerSeconds;
                    saveRecords(); updateRecordsDisplay();
                }
            } else {
                setTimeout(()=>{
                    cards[idx1].flipped=false; cards[idx2].flipped=false; flippedCards=[]; lockBoard=false; renderBoard();
                },700);
            }
            renderBoard();
        }
    }
    function setDifficulty(pairs){ currentPairs=pairs; document.querySelectorAll('.diff-btn').forEach(btn=>{ if(parseInt(btn.dataset.pairs)===pairs) btn.classList.add('active'); else btn.classList.remove('active'); }); newGame(); }
    function newGame(){ if(timerInterval) clearInterval(timerInterval); initGame(); }
    document.querySelectorAll('.diff-btn').forEach(btn=>btn.addEventListener('click',()=>setDifficulty(parseInt(btn.dataset.pairs))));
    document.getElementById('newGameBtn').addEventListener('click',()=>newGame());
    loadRecords(); initGame();
})();
</script>
</body>
</html>
